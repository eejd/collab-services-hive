---
# collab-services-hive — Primary Node Stack (M4 Mac Mini / Colima)
# Managed by: cshive start|stop|status|update primary
#
# Services:
#   (default profile)  mautrix-{signal,whatsapp,discord} bridges → sibeling.org VPS homeserver
#   (private profile)  Continuwuity homeserver for home.zt — personal sandbox, ZeroTier-only
#   (inviteonly profile) Continuwuity homeserver for sibeling.net — future phase
#
# Bridge ↔ homeserver communication:
#   Bridge → homeserver: HTTP POST to http://${COLLAB_VPS_ZT_IP}:${CONTINUWUITY_PORT}
#   Homeserver → bridge: HTTP POST to http://${COLLAB_PRIMARY_ZT_IP}:${*_APPSERVICE_PORT}
#   The *_APPSERVICE_PORT values must be published below so the VPS can reach them.

name: collab

networks:
  hive-net:
    external: true

volumes:
  collab_signal_data:
  collab_whatsapp_data:
  collab_discord_data:
  collab_private_data:
    # RocksDB state for home.zt private homeserver. Named volume — never virtiofs.

services:

  # ── Private Homeserver (home.zt) ─────────────────────────────────────────────
  # Started independently: cshive start private
  # TLS: HTTP-only via Traefik for now; TLS deferred to private-network-hive Phase 4.
  # Client config: set homeserver URL directly to http://matrix.home.zt in Element
  #   (bypasses .well-known discovery, which requires HTTPS).
  # WARNING: server_name is permanent — embedded in all user/room IDs. Do not change
  #   after first start. home.zt and sibeling.net are separate, independent servers.
  continuwuity-private:
    image: forgejo.ellis.link/continuwuation/continuwuity:${CONTINUWUITY_VERSION:-latest}
    container_name: collab-continuwuity-private
    restart: unless-stopped
    profiles:
      - private
    volumes:
      - collab_private_data:/var/lib/continuwuity
      - ${COLLAB_CONFIG_ROOT}/continuwuity-private:/etc/continuwuity:ro
    networks:
      - hive-net
    environment:
      CONDUWUIT_CONFIG: /etc/continuwuity/continuwuity.toml
      CONDUWUIT_REGISTRATION_SHARED_SECRET: "${PRIVATE_REGISTRATION_SHARED_SECRET}"
    healthcheck:
      # Continuwuity image is distroless — no curl/shell available for CMD healthchecks.
      disable: true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.collab-private.rule=Host(`matrix.home.zt`)"
      - "traefik.http.routers.collab-private.entrypoints=web"
      - "traefik.http.routers.collab-private-tls.rule=Host(`matrix.home.zt`)"
      - "traefik.http.routers.collab-private-tls.entrypoints=websecure"
      - "traefik.http.routers.collab-private-tls.tls=true"
      - "traefik.http.routers.collab-private-tls.service=collab-private"
      - "traefik.http.services.collab-private.loadbalancer.server.port=${PRIVATE_CONTINUWUITY_PORT:-6168}"

  # ── Signal Bridge ────────────────────────────────────────────────────────────
  signal:
    image: dock.mau.dev/mautrix/signal:${MAUTRIX_SIGNAL_VERSION:-latest}
    container_name: collab-signal
    restart: unless-stopped
    volumes:
      - collab_signal_data:/data
      - ${COLLAB_CONFIG_ROOT}/signal:/config:ro
    networks:
      - hive-net
    ports:
      # Appservice listener — homeserver (VPS) POSTs events here via ZeroTier.
      # Must be reachable at COLLAB_PRIMARY_ZT_IP from the VPS.
      - "${SIGNAL_APPSERVICE_PORT:-29328}:29328"
    environment:
      MAUTRIX_DIRECT_MEDIA_URL: ""
    labels:
      - "traefik.enable=false"

  # ── WhatsApp Bridge ──────────────────────────────────────────────────────────
  whatsapp:
    image: dock.mau.dev/mautrix/whatsapp:${MAUTRIX_WHATSAPP_VERSION:-latest}
    container_name: collab-whatsapp
    restart: unless-stopped
    volumes:
      - collab_whatsapp_data:/data
      - ${COLLAB_CONFIG_ROOT}/whatsapp:/config:ro
    networks:
      - hive-net
    ports:
      - "${WHATSAPP_APPSERVICE_PORT:-29318}:29318"
    labels:
      - "traefik.enable=false"

  # ── Discord Bridge ───────────────────────────────────────────────────────────
  discord:
    image: dock.mau.dev/mautrix/discord:${MAUTRIX_DISCORD_VERSION:-latest}
    container_name: collab-discord
    restart: unless-stopped
    volumes:
      - collab_discord_data:/data
      - ${COLLAB_CONFIG_ROOT}/discord:/config:ro
    networks:
      - hive-net
    ports:
      - "${DISCORD_APPSERVICE_PORT:-29334}:29334"
    labels:
      - "traefik.enable=false"
