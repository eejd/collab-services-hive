---
# collab-services-hive — VPS Stack (Gandi VPS)
# Managed by: cshive start|stop|status|update vps
# Deployed via: DOCKER_HOST=ssh://${COLLAB_VPS_SSH_HOST} docker compose -f docker-compose.vps.yml
#
# Services: Continuwuity (homeserver) + Caddy (TLS) + mautrix-wsproxy (iMessage relay)
# Bridges run on the primary node — see docker-compose.yml
#
# VPS prerequisites (run once):
#   cshive vps-setup   — creates directories, deploys config files
#   cshive vps-ufw     — configures UFW: ports 80/443/8448 public; 6167/29331 ZT-only
#   DNS: matrix.${MATRIX_DOMAIN} A record → VPS public IP (static)

name: collab-vps

networks:
  collab-vps-net:
    driver: bridge

volumes:
  collab_continuwuity_data:
    # RocksDB homeserver state. Never use a virtiofs or bind mount — RocksDB
    # requires a real block device. Backed up by: cshive backup
  collab_caddy_data:
    # Caddy ACME certificate storage. Persisted so certs survive container restarts.
  collab_caddy_config:
    # Caddy runtime config cache.

services:

  # ── Continuwuity (Matrix homeserver) ────────────────────────────────────────
  continuwuity:
    image: girlbossceo/continuwuity:${CONTINUWUITY_VERSION:-latest}
    container_name: collab-continuwuity
    restart: unless-stopped
    volumes:
      - collab_continuwuity_data:/var/lib/continuwuity
      # Config bind mount — deployed by: cshive vps-setup
      # Contains continuwuity.toml and (Phase 2) bridge registration YAMLs.
      - ${COLLAB_VPS_CONFIG_ROOT}/continuwuity:/etc/continuwuity:ro
    networks:
      - collab-vps-net
    ports:
      # Published to 0.0.0.0 so the VPS's ZeroTier interface can forward bridge
      # and MCP server requests. UFW (configured by cshive vps-ufw) restricts
      # this port to ZT_SUBNET — it is NOT exposed publicly.
      - "${CONTINUWUITY_PORT:-6167}:${CONTINUWUITY_PORT:-6167}"
    environment:
      # Point Continuwuity to the config file in the bind mount.
      CONDUWUIT_CONFIG: /etc/continuwuity/continuwuity.toml
      # Registration shared secret — kept as env var, not in the config file.
      # conduwuit env var prefix is CONDUWUIT_; override with CONTINUWUITY_ if needed.
      CONDUWUIT_REGISTRATION_SHARED_SECRET: "${CONTINUWUITY_REGISTRATION_SHARED_SECRET}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${CONTINUWUITY_PORT:-6167}/_matrix/client/versions"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── mautrix-wsproxy (iMessage relay) ─────────────────────────────────────────
  wsproxy:
    image: dock.mau.dev/mautrix/wsproxy:${WSPROXY_VERSION:-latest}
    container_name: collab-wsproxy
    restart: unless-stopped
    networks:
      - collab-vps-net
    ports:
      # iMessage relay WebSocket. Bound to 0.0.0.0 so the VPS's ZT interface
      # can accept the outbound connection from mautrix-imessage on the Mac Mini.
      # UFW restricts this to ZT_SUBNET.
      - "29331:29331"
    environment:
      LISTEN_ADDRESS: "0.0.0.0:29331"
      AS_TOKEN: "${WSPROXY_AS_TOKEN}"
      HS_TOKEN: "${WSPROXY_HS_TOKEN}"

  # ── Caddy (TLS termination) ──────────────────────────────────────────────────
  caddy:
    image: caddy:${CADDY_VERSION:-latest}
    container_name: collab-caddy
    restart: unless-stopped
    networks:
      - collab-vps-net
    ports:
      - "80:80"     # ACME HTTP-01 challenge (must be public)
      - "443:443"   # Matrix client-server API + .well-known delegation
      - "8448:8448" # Matrix server-to-server federation
    volumes:
      # Caddyfile deployed by: cshive vps-setup (copied as-is; Caddy reads {$VAR} at runtime)
      - ${COLLAB_VPS_CONFIG_ROOT}/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - collab_caddy_data:/data
      - collab_caddy_config:/config
    environment:
      # Caddy resolves {$VAR} syntax in the Caddyfile from these env vars.
      MATRIX_DOMAIN: "${MATRIX_DOMAIN}"
      MATRIX_SERVER_NAME: "${MATRIX_SERVER_NAME}"
      ACME_EMAIL: "${ACME_EMAIL}"
      CONTINUWUITY_PORT: "${CONTINUWUITY_PORT:-6167}"
    depends_on:
      continuwuity:
        condition: service_healthy
